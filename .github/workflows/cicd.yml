name: pipeline CI CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
jobs:
  test-cdn-api:
    name: (test) cdn api
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cdn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: cdn api run
        run: mvn clean test
